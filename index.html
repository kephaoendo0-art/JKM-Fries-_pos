<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf6f0; /* Soft Warm background */
            margin: 0;
            padding: 20px;
        }
        .paper {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            padding: 40px;
            border-top: 8px solid #d7ccc8; /* Subtle warm border */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 4px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .brand {
            font-size: 32px;
            font-weight: 800;
            color: #4e342e; /* Deep warm brown */
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .tagline {
            color: #8d6e63;
            font-style: italic;
            margin-top: 5px;
        }
        .content-area {
            min-height: 200px;
            color: #5d4037;
            line-height: 1.6;
        }
        .footer {
            margin-top: 60px;
            border-top: 1px solid #efebe9;
            padding-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #a1887f;
        }
    </style>
</head>
<body>

<div class="paper">
    <div class="header">
        <div class="brand">JKM Fries</div>
        <div class="tagline">Quality You Can Taste</div>
    </div>

    <div class="content-area">
        <p><strong>Date:</strong> May 27, 2026</p>
        <p>To our valued customer,</p>
        <p>Thank you for choosing JKM Fries. We take pride in serving you the best.</p>
        
        <!-- You can insert your dynamic order table here -->
        <br>
        <hr style="border: 0; border-top: 1px solid #efebe9;">
        <br>
    </div>

    <div class="footer">
        JKM Fries Enterprise | Nairobi, Kenya<br>
        Contact: [Your Phone Number] | Email: [Your Email]
    </div>
</div>

</body>
</html>
